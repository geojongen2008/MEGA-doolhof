<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGA doolhof</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 5px;
        }
        p {
            margin-bottom: 15px;
            color: #ccc;
        }
        #maze-container {
            position: relative;
            background-color: #111;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>MEGA doolhof</h1>
    <p>Gebruik de pijltjestoetsen of WASD. Start linksboven (groen), vind de enige juiste route naar rechtsonder (rood).</p>

    <div id="maze-container">
        <canvas id="mazeCanvas" width="972" height="732"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');

        // Grote afmetingen voor maximale moeilijkheid
        const cols = 81; // Moet oneven zijn
        const rows = 61; // Moet oneven zijn
        const cellSize = 12; 

        // Grid initialiseren (volledig gevuld met muren = 1)
        let grid = [];
        for (let r = 0; r < rows; r++) {
            grid[r] = [];
            for (let c = 0; c < cols; c++) {
                grid[r][c] = 1; 
            }
        }

        // Start- en eindposities
        let player = { x: 1, y: 1 };
        const exit = { x: cols - 2, y: rows - 2 };

        // Perfect Maze Algoritme (Depth-First Search via recursieve backtracking)
        // Dit garandeert wiskundig exact 1 unieke route tussen elk punt, zonder lussen.
        function generateMaze(r, c) {
            grid[r][c] = 0; // Maak huidige cel leeg (pad)

            // Richtingen om op te splitsen (telkens 2 stappen overslaan)
            const dirs = [
                [-2, 0], // Omhoog
                [2, 0],  // Omlaag
                [0, -2], // Links
                [0, 2]   // Rechts
            ].sort(() => Math.random() - 0.5); // Schud de richtingen willekeurig

            for (let [dr, dc] of dirs) {
                let nr = r + dr;
                let nc = c + dc;

                // Controleer of de nieuwe cel binnen het doolhof ligt en nog onbezocht (muur) is
                if (nr > 0 && nr < rows - 1 && nc > 0 && nc < cols - 1 && grid[nr][nc] === 1) {
                    // Hak de muur tussen de huidige cel en de nieuwe cel weg
                    grid[r + dr/2][c + dc/2] = 0;
                    // Ga recursief verder vanaf de nieuwe cel
                    generateMaze(nr, nc);
                }
            }
        }

        // Genereer het doolhof vanaf de startpositie
        generateMaze(1, 1);

        // Tekenfunctie
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Teken muren en paden
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 1) {
                        ctx.fillStyle = '#2c3e50'; // Kleur van de muren
                    } else {
                        ctx.fillStyle = '#0f171e'; // Kleur van de paden
                    }
                    ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
                }
            }

            // Teken uitgang (Rood)
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(exit.x * cellSize, exit.y * cellSize, cellSize, cellSize);

            // Teken speler (Groen)
            ctx.fillStyle = '#33ff33';
            ctx.beginPath();
            ctx.arc(player.x * cellSize + cellSize/2, player.y * cellSize + cellSize/2, cellSize/3, 0, Math.PI * 2);
            ctx.fill();
        }

        // Besturing en bewegingslogica
        window.addEventListener('keydown', (e) => {
            let nextX = player.x;
            let nextY = player.y;

            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') nextY--;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') nextY++;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') nextX--;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') nextX++;

            // Voorkom dat de browser scrollt met de pijltjestoetsen
            if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].indexOf(e.key) > -1) {
                e.preventDefault();
            }

            // Check of de stap op een pad (0) landt
            if (grid[nextY] && grid[nextY][nextX] === 0) {
                player.x = nextX;
                player.y = nextY;
                draw();

                // Check of de speler exact op de rode cel staat
                if (player.x === exit.x && player.y === exit.y) {
                    setTimeout(() => {
                        alert("Je hebt de uitgang gevonden!\nDe eindcoördinaten zijn: N51 19.879 E006 08.395");
                    }, 100);
                }
            }
        });

        // Start het spel en teken het doolhof
        draw();
    </script>
</body>
</html>
